<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Tabla de posiciones — Copa Cajamarca 2026 · Campeonato de Menores" />
  <title>Posiciones — Copa Cajamarca 2026</title>
  <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="pos.css" />
</head>
<body>

  <!-- Precarga Anton para uso en canvas -->
  <span style="font-family:'Anton';position:absolute;left:-9999px;opacity:0;">.</span>

  <header class="site-header">
    <div class="header-inner">
      <img src="../assets/img/logo.svg" alt="Copa Cajamarca 2026" class="logo" onerror="this.style.display='none'" />
      <div class="header-text">
        <span class="header-sup">Campeonato de Menores · 2026</span>
        <h1 class="header-title">Copa Cajamarca</h1>
      </div>
      <a href="../index.html" class="back-btn" title="Volver al inicio">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Inicio
      </a>
    </div>
  </header>

  <div class="pos-subheader">
    <div class="pos-subheader-inner">
      <div class="pos-subheader-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        Tabla de Posiciones
      </div>
      <div id="lastUpdated" class="pos-updated hidden">—</div>
    </div>
  </div>

  <!-- FILTROS DE CATEGORÍA -->
  <div class="cat-filter-wrap" id="catFilterWrap" hidden>
    <div class="cat-filter-scroll">
      <nav class="cat-filter-bar" id="catFilterBar"></nav>
    </div>
  </div>

  <main class="pos-main" id="posMain">

    <!-- SKELETON LOADER -->
    <div class="pos-loader" id="posLoader">
      <div class="loader-spin"></div>
      <div class="loader-text" id="loaderText">Conectando con el sistema...</div>
    </div>

    <!-- ERROR -->
    <div class="pos-error hidden" id="posError">
      <div class="error-icon">⚠️</div>
      <div class="error-title" id="errorTitle">Error al conectar</div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-retry" onclick="loadAll()">Reintentar</button>
    </div>

    <!-- CONTENIDO -->
    <div class="pos-content hidden" id="posContent">
      <div id="standingsContainer"></div>
    </div>

  </main>

  <!-- FOOTER CON BOTÓN DESCARGA -->
  <footer class="pos-footer">
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;">
      <button class="btn-download" id="btnDownload">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar Tabla PNG
      </button>
      <button class="btn-download" id="btnDownloadAll" style="background:linear-gradient(135deg, #f5c518 0%, #c8a012 100%); color:#000; border-color:#f5c518;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Descargar Todas (ZIP)
      </button>
    </div>
    <p class="footer-note">Datos en tiempo real · Sistema de Gestión Deportiva</p>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- JSZip para generar el archivo comprimido -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
