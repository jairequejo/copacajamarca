<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Tabla de posiciones de la Copa Cajamarca. Clasificación por categorías del Campeonato de Menores Copa Cajamarca 2026 en Cajamarca, Perú." />
  <meta name="keywords" content="Tabla de posiciones Copa Cajamarca, posiciones Copa Cajamarca, Copa Cajamarca, Copa Cajamarca 2026, campeonato de menores, fútbol infantil" />
  <title>Tabla de Posiciones | Copa Cajamarca - Campeonato de Menores</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/img/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css?v=2" />
  <link rel="stylesheet" href="../assets/css/posiciones.css?v=5" />
</head>
<body>

  <!-- Precarga Anton para uso en canvas -->
  <span style="font-family:'Anton';position:absolute;left:-9999px;opacity:0;">.</span>

  <header class="site-header">
    <div class="header-inner">
      <img src="../assets/img/logo.png" alt="Copa Cajamarca 2026" class="logo" onerror="this.style.display='none'" />
      <div class="header-text">
        <span class="header-sup">Campeonato de Menores · 2026</span>
        <h1 class="header-title">Copa Cajamarca</h1>
      </div>
    </div>
  </header>

  <div class="pos-subheader">
    <div class="pos-subheader-inner">
      <div class="pos-subheader-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        Tabla de Posiciones
      </div>
      <div id="lastUpdated" class="pos-updated hidden">—</div>
    </div>
  </div>

  <!-- FILTROS DE CATEGORÍA -->
  <div class="cat-filter-wrap" id="catFilterWrap" hidden>
    <div class="cat-filter-scroll">
      <nav class="cat-filter-bar" id="catFilterBar"></nav>
    </div>
  </div>

  <main class="pos-main" id="posMain">

    <!-- SKELETON LOADER -->
    <div class="pos-loader" id="posLoader">
      <div class="loader-spin"></div>
      <div class="loader-text" id="loaderText">Conectando con el sistema...</div>
    </div>

    <!-- ERROR -->
    <div class="pos-error hidden" id="posError">
      <div class="error-icon">⚠️</div>
      <div class="error-title" id="errorTitle">Error al conectar</div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-retry" onclick="loadAll()">Reintentar</button>
    </div>

    <!-- CONTENIDO -->
    <div class="pos-content hidden" id="posContent">
      <div id="standingsContainer"></div>
    </div>

  </main>

  <!-- FOOTER CON BOTONES DE DESCARGA -->
  <footer class="pos-footer">
    <div class="pos-footer-btns">
      <button class="btn-download" id="btnDownload">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar PNG
      </button>
      <button class="btn-download btn-download-zip" id="btnDownloadAll">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Descargar ZIP
      </button>
    </div>
    <p class="footer-note">Datos en tiempo real · Sistema de Gestión Deportiva</p>
  </footer>

  <!-- BARRA DE NAVEGACIÓN INFERIOR — 5 opciones -->
  <nav class="bottom-nav" aria-label="Navegación principal">
    <a href="/" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      <span>Inicio</span>
    </a>
    <a href="/vivo/" class="bnav-item bnav-live">
      <span class="bnav-live-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
        <span class="bnav-live-dot"></span>
      </span>
      <span>En Vivo</span>
    </a>
    <a href="/fixture/" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Fixture</span>
    </a>
    <a href="/posiciones/" class="bnav-item bnav-active" aria-current="page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Posiciones</span>
    </a>
    <a href="/jugadores/" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Jugadores</span>
    </a>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- JSZip para generar el archivo comprimido -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="../assets/js/posiciones.js?v=4"></script>
</body>
</html>
