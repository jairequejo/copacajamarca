<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Fixture completo — Copa Cajamarca 2026 · Jornadas, resultados y descansos" />
  <title>Fixture — Copa Cajamarca 2026</title>
  <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/fixture.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <img src="../assets/img/logo.svg" alt="Copa Cajamarca 2026" class="logo" onerror="this.style.display='none'" />
      <div class="header-text">
        <span class="header-sup">Campeonato de Menores · 2026</span>
        <h1 class="header-title">Copa Cajamarca</h1>
      </div>
    </div>
    <div class="page-subtitle">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Fixture completo
      <span id="liveGlobalBadge" style="display:none;align-items:center;gap:4px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;letter-spacing:0.3px;">
        <span style="width:6px;height:6px;background:#fca5a5;border-radius:50%;display:inline-block;animation:copa-pulse 1.3s ease-in-out infinite"></span>
        <span id="liveGlobalCount">0</span>&nbsp;en vivo
      </span>
    </div>
  </header>

  <!-- FILTROS -->
  <div class="filters-wrap" id="filtersWrap">
    <!-- TABS DE CATEGORÍA -->
    <div class="filter-row cat-row">
      <span class="filter-label">Cat.</span>
      <div class="cat-tabs-wrap">
        <div class="cat-tabs" id="catTabs"></div>
      </div>
    </div>
    <!-- PILLS DE JORNADA -->
    <div class="filter-row jornada-row" id="jornadaRow" hidden>
      <span class="filter-label">Jor.</span>
      <div class="jornada-pills-wrap">
        <div class="jornada-pills" id="jornadaPills"></div>
      </div>
    </div>
  </div>

  <!-- RESUMEN RÁPIDO -->
  <div class="quick-stats" id="quickStats" hidden>
    <div class="qs-item">
      <span class="qs-num" id="qsJornadas">—</span>
      <span class="qs-lbl">Jornadas</span>
    </div>
    <div class="qs-sep"></div>
    <div class="qs-item">
      <span class="qs-num" id="qsPartidos">—</span>
      <span class="qs-lbl">Partidos</span>
    </div>
    <div class="qs-sep"></div>
    <div class="qs-item">
      <span class="qs-num qs-live" id="qsLive">—</span>
      <span class="qs-lbl">En vivo</span>
    </div>
  </div>

  <!-- CONTENIDO DEL FIXTURE -->
  <main class="main-content">

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span>Cargando fixture…</span>
    </div>

    <div id="fixtureContent" hidden></div>

    <div class="empty-state" id="emptyState" hidden>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <p class="empty-title">Sin partidos</p>
      <p class="empty-sub">No hay datos para esta categoría</p>
    </div>

  </main>

  <!-- BARRA DE NAVEGACIÓN INFERIOR — 5 opciones -->
  <nav class="bottom-nav" aria-label="Navegación principal">
    <a href="/" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      <span>Inicio</span>
    </a>
    <a href="/vivo/" class="bnav-item bnav-live">
      <span class="bnav-live-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
        <span class="bnav-live-dot"></span>
      </span>
      <span>En Vivo</span>
    </a>
    <a href="/fixture/" class="bnav-item bnav-active" aria-current="page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Fixture</span>
    </a>
    <a href="/posiciones/" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Posiciones</span>
    </a>
    <a href="/jugadores/" class="bnav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Jugadores</span>
    </a>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="../assets/js/fixture.js"></script>
</body>
</html>
